set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*:RGB"

# Enable mouse support
set -g mouse on

# Enable clipboard
set -g set-clipboard on

unbind t
unbind C-b
set -g prefix M-S-C-Space
bind-key M-S-C-Space send-prefix

# Vim-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Split windows (opens in same directory)
unbind %
bind | split-window -h -c "#{pane_current_path}"

unbind '"'
bind - split-window -v -c "#{pane_current_path}"

# Reload config
unbind r
bind r source-file ~/nixos-dotfiles/config/tmux/tmux.conf

bind-key "t" run-shell "sesh connect \"$(
  sesh list --icons | fzf-tmux -p 80%,70% \
    --no-sort --ansi --border-label ' sesh ' --prompt '⚡  ' \
    --header '  ^a all ^t tmux ^g configs ^x zoxide ^d tmux kill ^f find' \
    --bind 'tab:down,btab:up' \
    --bind 'ctrl-a:change-prompt(⚡  )+reload(sesh list --icons)' \
    --bind 'ctrl-t:change-prompt(🪟  )+reload(sesh list -t --icons)' \
    --bind 'ctrl-g:change-prompt(⚙️  )+reload(sesh list -c --icons)' \
    --bind 'ctrl-x:change-prompt(📁  )+reload(sesh list -z --icons)' \
    --bind 'ctrl-f:change-prompt(🔎  )+reload(fd -H -d 2 -t d -E .Trash . ~)' \
    --bind 'ctrl-d:execute(tmux kill-session -t {2..})+change-prompt(⚡  )+reload(sesh list --icons)' \
    --preview-window 'right:55%' \
    --preview 'sesh preview {}'
)\""

# Alt+hjkl to switch panes without prefix
bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R

# prefix + shift-arrow to move windows
bind-key  S-Left swap-window -t -1\; select-window -t -1
bind-key  S-Right swap-window -t +1\; select-window -t +1

# Alt+number to select window
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9

# Gruvbox Dark theme colors
thm_bg="#282828"
thm_fg="#ebdbb2"
thm_cyan="#8ec07c"
thm_black="#282828"
thm_gray="#928374"
thm_magenta="#d3869b"
thm_pink="#fb4934"
thm_red="#cc241d"
thm_green="#b8bb26"
thm_yellow="#fabd2f"
thm_blue="#83a598"
thm_orange="#fe8019"
thm_black4="#3c3836"

# Change from 0 based to 1 based because keyboard layout
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

# Vim-like copy/paste
set-window-option -g mode-keys vi
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel
unbind -T copy-mode-vi MouseDragEnd1Pane
thm_red="#cc241d"
thm_green="#b8bb26"
thm_yellow="#fabd2f"
thm_blue="#83a598"
thm_orange="#fe8019"
thm_black4="#3c3836"

# --- Gruvbox Aesthetics ---
# These use the variables mapped in the previous step

set -g status "on"
set -g status-position "top"
set -g status-bg "${thm_bg}"
set -g status-justify "left"
set -g status-left-length "100"
set -g status-right-length "100"

# Messages
set -g message-style "fg=${thm_yellow},bg=${thm_black4},bold"
set -g message-command-style "fg=${thm_yellow},bg=${thm_black4},bold"

# Panes
set -g pane-border-style "fg=${thm_black4}"
set -g pane-active-border-style "fg=${thm_blue}"

# Windows
set -g window-status-activity-style "fg=${thm_fg},bg=${thm_bg},none"
set -g window-status-separator ""
set -g window-status-style "fg=${thm_gray},bg=${thm_bg},none"

# --- Statusline - Left Side ---
# Shows a colored block for the session name
set -g status-left "#[fg=${thm_bg},bg=${thm_yellow},bold] #S #[fg=${thm_yellow},bg=${thm_bg},nobold,nounderscore,noitalics]"

# --- Statusline - Window Tabs ---
# Current Window: High contrast with a checkmark and path
set -g window-status-current-format "#[fg=${thm_bg},bg=${thm_orange},nobold,nounderscore,noitalics]#[fg=${thm_bg},bg=${thm_orange},bold] #I  #W #[fg=${thm_orange},bg=${thm_bg},nobold,nounderscore,noitalics]"

# Inactive Windows: Muted colors
set -g window-status-format "#[fg=${thm_bg},bg=${thm_bg},nobold,nounderscore,noitalics] #[fg=${thm_gray},bg=${thm_bg}] #I  #W #[fg=${thm_bg},bg=${thm_bg},nobold,nounderscore,noitalics] "

# --- Statusline - Right Side ---
# Displays: Path | Prefix Indicator | Hostname/Clock
set -g status-right "#[fg=${thm_black4},bg=${thm_bg},nobold,nounderscore,noitalics]#[fg=${thm_fg},bg=${thm_black4}] #(echo '#{pane_current_path}' | rev | cut -d'/' -f-1 | rev) #[fg=${thm_yellow},bg=${thm_black4}]#[fg=${thm_bg},bg=${thm_yellow}] #{?client_prefix,#[fg=${thm_red}]󰈸 PREFIX ,#[fg=${thm_bg}]󰚌 NORMAL } #[fg=${thm_blue},bg=${thm_yellow},nobold,nounderscore,noitalics]#[fg=${thm_bg},bg=${thm_blue},bold] %H:%M "

# Modes
set -g mode-style "fg=${thm_yellow} bg=${thm_black4} bold"

# Muted border for inactive panes
set -g pane-border-style "fg=${thm_gray}"

# High-contrast border for the active pane
set -g pane-active-border-style "fg=${thm_orange},bg=${thm_bg}"
